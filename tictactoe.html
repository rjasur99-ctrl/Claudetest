<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { margin-bottom: 10px; }
    #status { font-size: 1.2rem; margin-bottom: 20px; min-height: 1.5em; }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 6px;
    }
    .cell {
      background: #16213e;
      border: none;
      border-radius: 8px;
      font-size: 2.5rem;
      cursor: pointer;
      color: #eee;
      transition: background 0.15s;
    }
    .cell:hover:not(:disabled) { background: #0f3460; }
    .cell:disabled { cursor: default; }
    #restart {
      margin-top: 24px;
      padding: 10px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      border-radius: 8px;
    }
    #restart:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="restart">Restart</button>

  <script>
    const board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;

    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function checkWinner() {
      for (const [a,b,c] of wins) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
      }
      return board.every(Boolean) ? 'draw' : null;
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const btn = document.createElement('button');
        btn.className = 'cell';
        btn.textContent = val || '';
        btn.disabled = !!val || gameOver;
        btn.onclick = () => move(i);
        boardEl.appendChild(btn);
      });
    }

    function move(i) {
      if (board[i] || gameOver) return;
      board[i] = current;
      const result = checkWinner();
      if (result) {
        gameOver = true;
        document.getElementById('status').textContent =
          result === 'draw' ? "It's a draw!" : `Player ${result} wins!`;
      } else {
        current = current === 'X' ? 'O' : 'X';
        document.getElementById('status').textContent = `Player ${current}'s turn`;
      }
      render();
    }

    document.getElementById('restart').onclick = () => {
      board.fill(null);
      current = 'X';
      gameOver = false;
      document.getElementById('status').textContent = "Player X's turn";
      render();
    };

    render();
  </script>
</body>
</html>
